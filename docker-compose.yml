version: '3.8'

services:
  streamlit:
    build: .
    container_name: streamlit_app
    ports:
      - "8501:8501"
    environment:
      DB_HOST: postgres
      DB_NAME: demo_db
      DB_USER: demo_user
      DB_PASSWORD: demo_pass
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    depends_on:
      - postgres
    command: bash -c "pip install -r requirements.txt && streamlit run app.py"

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: demo_db
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
