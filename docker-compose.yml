services:
  # Servicio 1: Tu Aplicación Streamlit
  streamlit:
    image: python:3.11-slim
    container_name: streamlit_app
    working_dir: /app
    ports:
      - "8501:8501"
    volumes:
     - ./streamlit:/app
     - ./streamlit/uploads:/app/uploads
    depends_on:
      - mongo
    command: >
      bash -c "pip install -r requirements.txt && 
               streamlit run app.py --server.address=0.0.0.0"

  # Servicio 2: MongoDB
  mongo:
    image: mongo:latest
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
